<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก – AI Course Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <button class="dm-toggle" title="เปลี่ยนธีม"><i class="fa fa-moon"></i></button>

  <div class="login-wrapper">

    <!-- Left panel -->
    <div class="left-panel">
      <div class="brand">
        <div class="brand-icon"><i class="fa fa-graduation-cap"></i></div>
        <span class="brand-name">AI Course Hub</span>
      </div>
      <h1>สร้างบัญชีใหม่</h1>
      <p>เข้าร่วมกับเราเพื่อเรียนรู้คอร์สออนไลน์<br/>คุณภาพสูงได้ทุกที่ทุกเวลา</p>
      <div class="feature-list">
        <div class="feature-item"><i class="fa fa-check-circle"></i> เข้าถึงคอร์สทั้งหมด</div>
        <div class="feature-item"><i class="fa fa-check-circle"></i> เรียนได้ทุกที่ทุกเวลา</div>
        <div class="feature-item"><i class="fa fa-check-circle"></i> ติดตามความก้าวหน้า</div>
        <div class="feature-item"><i class="fa fa-check-circle"></i> ใบประกาศนียบัตรออนไลน์</div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">
      <div class="login-card">

        <div class="card-header">
          <div class="avatar-icon"><i class="fa fa-user-plus"></i></div>
          <h2>สมัครสมาชิก</h2>
        </div>

        <div class="alert" id="alert" style="display:none">
          <i class="fa fa-circle-exclamation"></i>
          <span id="alertMsg"></span>
        </div>

        <div class="alert success" id="alertSuccess" style="display:none">
          <i class="fa fa-circle-check"></i>
          <span id="alertSuccessMsg"></span>
        </div>

        <form id="registerForm" autocomplete="off" novalidate>

          <div class="form-group">
            <label for="email">อีเมล</label>
            <div class="input-wrap">
              <i class="fa fa-envelope input-icon"></i>
              <input type="email" id="email" placeholder="กรอกอีเมล..." autocomplete="email" />
            </div>
          </div>

          <div class="form-group">
            <label for="username">ชื่อผู้ใช้</label>
            <div class="input-wrap">
              <i class="fa fa-user input-icon"></i>
              <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้..." autocomplete="username" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">รหัสผ่าน</label>
            <div class="input-wrap">
              <i class="fa fa-lock input-icon"></i>
              <input type="password" id="password" placeholder="กรอกรหัสผ่าน..." autocomplete="new-password" />
              <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
                <i class="fa fa-eye" id="togglePwIcon"></i>
              </button>
            </div>
            <div class="strength-bar" id="strengthBar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
            <div class="input-wrap">
              <i class="fa fa-lock input-icon"></i>
              <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง..." autocomplete="new-password" />
              <button type="button" class="toggle-pw" id="togglePw2" tabindex="-1">
                <i class="fa fa-eye" id="togglePwIcon2"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">
            <span id="btnText"><i class="fa fa-user-plus"></i> สมัครสมาชิก</span>
            <span id="btnLoader" style="display:none"><i class="fa fa-circle-notch fa-spin"></i> กำลังดำเนินการ...</span>
          </button>

        </form>

        <div class="register-link">
          มีบัญชีอยู่แล้ว? <a href="../Login/index.html">เข้าสู่ระบบ</a>
        </div>

      </div>
    </div>

  </div>

  <script src="../darkmode.js"></script>
  <script src="script.js"></script>
</body>
</html>
