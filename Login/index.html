<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ – AI Course Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <!-- Top-right controls -->
  <div class="top-controls">
    <div class="lang-selector" id="langSelector">
      <button class="lang-current" id="langCurrent">
        <span id="langFlag">🇹🇭</span>
        <span id="langCode">TH</span>
        <i class="fa fa-chevron-down lang-arrow"></i>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-option active" data-lang="th">🇹🇭 ภาษาไทย</button>
        <button class="lang-option" data-lang="en">🇬🇧 English</button>
      </div>
    </div>
    <button class="dm-toggle" title="เปลี่ยนธีม"><i class="fa fa-moon"></i></button>
  </div>

  <div class="login-wrapper">

    <!-- Left panel -->
    <div class="left-panel">
      <div class="brand">
        <div class="brand-icon"><i class="fa fa-graduation-cap"></i></div>
        <span class="brand-name">AI Course Hub</span>
      </div>
      <h1>Welcome</h1>
      <p data-i18n-html="left.sub">สมัครสมาชิกและเข้าสู่ระบบ<br/>เพื่อเข้าถึงคอร์สเรียนออนไลน์ทั้งหมด</p>
      <div class="feature-list">
        <div class="feature-item"><i class="fa fa-check-circle"></i> <span data-i18n="feat1">คอร์สทั้งหมดฟรี</span></div>
        <div class="feature-item"><i class="fa fa-check-circle"></i> <span data-i18n="feat2">ไม่มีค่าใช้จ่ายแอบแฝง</span></div>
        <div class="feature-item"><i class="fa fa-check-circle"></i> <span data-i18n="feat3">จัดหมวดหมู่ให้อย่างชัดเจน</span></div>
        <div class="feature-item"><i class="fa fa-check-circle"></i> <span data-i18n="feat4">รวบรวมคอร์สจากหลายแหล่งที่มา</span></div>
      </div>
    </div>

    <!-- Right panel — login form -->
    <div class="right-panel">
      <div class="login-card">

        <div class="card-header">
          <div class="avatar-icon"><i class="fa fa-user-shield"></i></div>
          <h2 data-i18n="heading">เข้าสู่ระบบ</h2>
        </div>

        <!-- Alert -->
        <div class="alert" id="alert" style="display:none">
          <i class="fa fa-circle-exclamation"></i>
          <span id="alertMsg"></span>
        </div>

        <form id="loginForm" autocomplete="off" novalidate>

          <div class="form-group">
            <label for="username" data-i18n="label.user">ชื่อผู้ใช้</label>
            <div class="input-wrap">
              <i class="fa fa-user input-icon"></i>
              <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้"
                data-i18n-placeholder="ph.user" autocomplete="username" />
            </div>
          </div>

          <div class="form-group">
            <label for="password" data-i18n="label.pw">รหัสผ่าน</label>
            <div class="input-wrap">
              <i class="fa fa-lock input-icon"></i>
              <input type="password" id="password" placeholder="กรอกรหัสผ่าน"
                data-i18n-placeholder="ph.pw" autocomplete="current-password" />
              <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
                <i class="fa fa-eye" id="togglePwIcon"></i>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-label">
              <input type="checkbox" id="rememberMe" />
              <span class="custom-check"></span>
              <span data-i18n="remember">จดจำการเข้าสู่ระบบ</span>
            </label>
            <a href="../ForgotPassword/index.html" class="forgot-link" data-i18n="forgot">ลืมรหัสผ่าน?</a>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">
            <span id="btnText"><i class="fa fa-arrow-right-to-bracket"></i> <span data-i18n="btn.login">เข้าสู่ระบบ</span></span>
            <span id="btnLoader" style="display:none"><i class="fa fa-circle-notch fa-spin"></i> <span data-i18n="btn.loading">กำลังตรวจสอบ...</span></span>
          </button>

        </form>

        <div class="register-link">
          <span data-i18n="no.account">ยังไม่มีบัญชี?</span> <a href="../Register/index.html" data-i18n="register">สมัครสมาชิก</a>
        </div>

      </div>
    </div>

  </div>

  <script src="../darkmode.js"></script>
  <script src="script.js"></script>
</body>
</html>
