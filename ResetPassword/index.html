<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตั้งรหัสผ่านใหม่ – AI Course Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <button class="dm-toggle" title="เปลี่ยนธีม"><i class="fa fa-moon"></i></button>

  <div class="login-wrapper">

    <!-- Left panel -->
    <div class="left-panel">
      <div class="brand">
        <div class="brand-icon"><i class="fa fa-graduation-cap"></i></div>
        <span class="brand-name">AI Course Hub</span>
      </div>
      <h1>ตั้งรหัสผ่าน<br/>ใหม่</h1>
      <p>กรอกรหัส OTP ที่ได้รับทางอีเมล<br/>พร้อมกับรหัสผ่านใหม่ที่ต้องการ</p>
      <div class="feature-list">
        <div class="feature-item"><i class="fa fa-shield-halved"></i> รหัส OTP มีอายุ 15 นาที</div>
        <div class="feature-item"><i class="fa fa-lock"></i> รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร</div>
        <div class="feature-item"><i class="fa fa-rotate-left"></i> ขอรหัสใหม่ได้หากหมดอายุ</div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">
      <div class="login-card">

        <div class="card-header">
          <div class="avatar-icon"><i class="fa fa-key"></i></div>
          <h2>ตั้งรหัสผ่านใหม่</h2>
          <p>กรอกรหัส OTP และรหัสผ่านใหม่</p>
        </div>

        <!-- Error Alert -->
        <div class="alert alert-error" id="alertError" style="display:none">
          <i class="fa fa-circle-exclamation"></i>
          <span id="alertErrorMsg"></span>
        </div>

        <!-- Success Alert -->
        <div class="alert alert-success" id="alertSuccess" style="display:none">
          <i class="fa fa-circle-check"></i>
          <span id="alertSuccessMsg"></span>
        </div>

        <form id="resetForm" autocomplete="off" novalidate>

          <!-- OTP -->
          <div class="form-group">
            <label for="otp">รหัส OTP (6 หลัก)</label>
            <div class="input-wrap">
              <i class="fa fa-hashtag input-icon"></i>
              <input
                type="text"
                id="otp"
                placeholder="กรอกรหัส OTP..."
                maxlength="6"
                inputmode="numeric"
                autocomplete="one-time-code"
              />
            </div>
          </div>

          <!-- New Password -->
          <div class="form-group">
            <label for="newPassword">รหัสผ่านใหม่</label>
            <div class="input-wrap">
              <i class="fa fa-lock input-icon"></i>
              <input
                type="password"
                id="newPassword"
                placeholder="รหัสผ่านใหม่อย่างน้อย 6 ตัวอักษร..."
                autocomplete="new-password"
              />
              <button type="button" class="toggle-pw" id="togglePw1" tabindex="-1">
                <i class="fa fa-eye" id="togglePwIcon1"></i>
              </button>
            </div>
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
            <div class="input-wrap">
              <i class="fa fa-lock-open input-icon"></i>
              <input
                type="password"
                id="confirmPassword"
                placeholder="กรอกรหัสผ่านใหม่อีกครั้ง..."
                autocomplete="new-password"
              />
              <button type="button" class="toggle-pw" id="togglePw2" tabindex="-1">
                <i class="fa fa-eye" id="togglePwIcon2"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">
            <span id="btnText"><i class="fa fa-check"></i> ตั้งรหัสผ่านใหม่</span>
            <span id="btnLoader" style="display:none"><i class="fa fa-circle-notch fa-spin"></i> กำลังบันทึก...</span>
          </button>

        </form>

        <div class="register-link">
          <a href="../ForgotPassword/index.html"><i class="fa fa-rotate-left"></i> ขอรหัส OTP ใหม่</a>
          &nbsp;|&nbsp;
          <a href="../Login/index.html"><i class="fa fa-arrow-left"></i> กลับหน้าเข้าสู่ระบบ</a>
        </div>

      </div>
    </div>

  </div>

  <script src="../darkmode.js"></script>
  <script src="script.js"></script>
</body>
</html>
