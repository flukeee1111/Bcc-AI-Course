<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Course Hub — Sign In</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Animated grid background -->
  <div class="grid-bg"></div>

  <!-- Glow orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="scene">

    <!-- Left: branding -->
    <div class="brand-side">
      <div class="brand-inner">

        <div class="logo">
          <div class="logo-mark">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="url(#lg)" stroke-width="1.5" fill="none"/>
              <polygon points="14,7 21,11 21,17 14,21 7,17 7,11" fill="url(#lg2)" opacity="0.3"/>
              <circle cx="14" cy="14" r="3" fill="url(#lg)"/>
              <defs>
                <linearGradient id="lg" x1="0" y1="0" x2="28" y2="28">
                  <stop offset="0%" stop-color="#00f5ff"/>
                  <stop offset="100%" stop-color="#bf5fff"/>
                </linearGradient>
                <linearGradient id="lg2" x1="0" y1="0" x2="28" y2="28">
                  <stop offset="0%" stop-color="#00f5ff"/>
                  <stop offset="100%" stop-color="#bf5fff"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="logo-text">AI Course Hub</span>
        </div>

        <div class="brand-headline">
          <div class="tag-line">NEXT-GEN LEARNING</div>
          <h1>
            Master<br/>
            <span class="gradient-text">Artificial<br/>Intelligence</span>
          </h1>
          <p>คอร์ส AI ระดับโลก พร้อมพาคุณไปสู่อนาคต<br/>ที่ขับเคลื่อนด้วยปัญญาประดิษฐ์</p>
        </div>

        <div class="stat-strip">
          <div class="stat">
            <span class="stat-n">50K<sup>+</sup></span>
            <span class="stat-l">Learners</span>
          </div>
          <div class="stat-sep"></div>
          <div class="stat">
            <span class="stat-n">200<sup>+</sup></span>
            <span class="stat-l">Courses</span>
          </div>
          <div class="stat-sep"></div>
          <div class="stat">
            <span class="stat-n">4.9</span>
            <span class="stat-l">Rating</span>
          </div>
        </div>

        <div class="brand-badge">
          <div class="pulse-ring"></div>
          <div class="pulse-dot"></div>
          <span>Live sessions available now</span>
        </div>

      </div>
    </div>

    <!-- Right: login card -->
    <div class="form-side">
      <div class="glass-card">

        <div class="card-glow"></div>

        <div class="form-head">
          <h2>Welcome back</h2>
          <p>Sign in to continue your journey</p>
        </div>

        <!-- Social -->
        <div class="social-row">
          <button class="s-btn" onclick="socialLogin('Google')">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="s-btn" onclick="socialLogin('GitHub')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <div class="sep"><span>or</span></div>

        <form id="loginForm" novalidate>

          <div class="field">
            <input type="email" id="email" name="email"
                   placeholder=" " autocomplete="email" />
            <label for="email">Email address</label>
            <div class="field-line"></div>
            <span class="err" id="emailErr"></span>
          </div>

          <div class="field">
            <div class="pw-wrap">
              <input type="password" id="password" name="password"
                     placeholder=" " autocomplete="current-password" />
              <label for="password">Password</label>
              <div class="field-line"></div>
              <button type="button" id="togglePw">
                <svg id="eyeShow" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeHide" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     class="hidden">
                  <line x1="1" y1="1" x2="23" y2="23"/>
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                </svg>
              </button>
            </div>
            <span class="err" id="passwordErr"></span>
          </div>

          <div class="row-between">
            <label class="check-label">
              <input type="checkbox" id="remember" />
              <span class="chk"></span>
              Remember me
            </label>
            <a href="#" class="link-dim" onclick="forgotPassword(event)">Forgot password?</a>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            <span id="btnText">Sign In</span>
            <span id="btnLoader" class="ring hidden"></span>
            <span class="btn-arrow" id="btnArrow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </span>
          </button>

        </form>

        <p class="foot-note">
          No account? <a href="#" onclick="goToRegister(event)">Create one free</a>
        </p>

      </div>
    </div>

  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="login.js"></script>
</body>
</html>
